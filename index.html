<!DOCTYPE html>
<html>
<head>
    <title>Tính mức khoán</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, select { margin: 5px; padding: 5px; }
        table { border-collapse: collapse; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>

<h2>Tính mức khoán công đoạn</h2>

<label>Công đoạn:</label><br>
<input type="text" id="ten"><br>

<label>SAM:</label><br>
<input type="number" id="sam" step="0.001"><br>

<label>Bậc công đoạn:</label><br>
<select id="bac">
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="NB">NB</option>
</select><br>

<button onclick="tinh()">Tính</button>

<h3>Kết quả:</h3>

<table>
<tr>
    <th>Tên</th>
    <th>SAM</th>
    <th>Bậc</th>
    <th>Mức khoán</th>
    <th>Khoán 1h</th>
</tr>
<tr id="row"></tr>
</table>

<script>

// bảng giống Excel của bạn
const mucKhoanTable = {
    "A": 0.5,
    "B": 0.6,
    "C": 0.65,
    "D": 0.7,
    "NB": 0.75
};

function tinh() {
    let ten = document.getElementById("ten").value;
    let sam = parseFloat(document.getElementById("sam").value);
    let bac = document.getElementById("bac").value;

    let mucKhoan = mucKhoanTable[bac];
    let khoan1h = (60 / sam) * mucKhoan;

    document.getElementById("row").innerHTML = `
        <td>${ten}</td>
        <td>${sam}</td>
        <td>${bac}</td>
        <td>${mucKhoan}</td>
        <td>${khoan1h.toFixed(2)}</td>
    `;
}

</script>

</body>
</html>
